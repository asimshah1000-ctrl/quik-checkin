<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>QUIK — Driver Check-in</title>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>

<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#0B1120;--card:#111827;--border:#1E2D45;
  --blue:#3B82F6;--green:#22C55E;--orange:#F97316;--red:#EF4444;--purple:#A855F7;
  --text:#F1F5F9;--muted:#64748B;
}
body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;padding:0}
.page{max-width:480px;margin:0 auto;padding:20px 16px 40px}

/* Header */
.hdr{text-align:center;padding:24px 0 20px}
.logo{font-family:'Syne',sans-serif;font-weight:800;font-size:22px;color:#fff}
.logo span{color:var(--orange)}
.store-badge{display:inline-block;background:linear-gradient(135deg,#1D4ED8,#7C3AED);color:#fff;border-radius:12px;padding:12px 20px;margin-top:14px;font-size:13px;font-weight:600;letter-spacing:.3px}
.store-name{font-family:'Syne',sans-serif;font-size:22px;font-weight:800;margin-top:4px}

/* Status Card */
.status-card{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:20px;margin-bottom:16px}
.sc-title{font-size:10px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--muted);margin-bottom:14px}
.status-row{display:flex;align-items:center;gap:12px;padding:10px 0;border-bottom:1px solid var(--border)}
.status-row:last-child{border-bottom:none}
.status-icon{width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0}
.si-pending{background:#1E293B}
.si-done{background:#16A34A20}
.si-active{background:#3B82F620;animation:ring 1.5s ease-in-out infinite}
@keyframes ring{0%,100%{box-shadow:0 0 0 0 #3B82F640}50%{box-shadow:0 0 0 8px transparent}}
.status-info{flex:1}
.status-label{font-size:13px;font-weight:600}
.status-time{font-size:11px;color:var(--muted);margin-top:2px;font-family:monospace}
.status-check{font-size:18px}

/* Action Buttons */
.action-section{margin-bottom:16px}
.action-btn{width:100%;padding:18px;border:none;border-radius:14px;font-size:16px;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:10px;margin-bottom:10px;transition:all .15s;letter-spacing:.3px;position:relative;overflow:hidden}
.action-btn:active{transform:scale(.97)}
.action-btn:disabled{opacity:.4;cursor:not-allowed;transform:none}
.btn-arrived{background:linear-gradient(135deg,var(--blue),#1D4ED8);color:#fff;box-shadow:0 4px 20px #3B82F640}
.btn-departed{background:linear-gradient(135deg,var(--orange),#EA580C);color:#fff;box-shadow:0 4px 20px #F9731640}
.btn-completed{background:linear-gradient(135deg,var(--green),#15803D);color:#fff;box-shadow:0 4px 20px #22C55E40}
.btn-icon{font-size:22px}

/* Driver input */
.driver-section{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:16px;margin-bottom:16px}
.driver-label{font-size:10px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--muted);margin-bottom:8px;display:block}
.driver-input{width:100%;background:#1E293B;border:1px solid var(--border);border-radius:9px;padding:12px 14px;color:var(--text);font-size:15px;font-family:'Inter',sans-serif;outline:none;transition:border-color .2s}
.driver-input:focus{border-color:var(--blue)}
.photo-section{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:16px;margin-bottom:14px}
.photo-upload-btn{width:100%;padding:14px;background:#1E293B;border:2px dashed var(--border);border-radius:10px;color:var(--text);font-size:13px;font-weight:600;cursor:pointer;text-align:center;display:block;transition:all .2s}
.photo-upload-btn:hover{border-color:var(--blue)}
.photo-preview{width:100%;max-height:200px;object-fit:cover;border-radius:8px;display:none;margin-top:10px}
.upload-prog{height:4px;background:var(--border);border-radius:2px;overflow:hidden;margin-top:8px;display:none}
.upload-prog-bar{height:100%;background:var(--green);border-radius:2px;width:0%;transition:width .3s}

/* Success overlay */
.success-overlay{position:fixed;inset:0;background:rgba(0,0,0,.85);display:flex;align-items:center;justify-content:center;z-index:100;opacity:0;pointer-events:none;transition:opacity .3s}
.success-overlay.show{opacity:1;pointer-events:all}
.success-box{background:var(--card);border:1px solid #22C55E60;border-radius:20px;padding:32px 24px;text-align:center;max-width:320px;width:90%;animation:popIn .3s ease}
@keyframes popIn{from{transform:scale(.85);opacity:0}to{transform:scale(1);opacity:1}}
.success-emoji{font-size:56px;margin-bottom:14px;display:block}
.success-title{font-family:'Syne',sans-serif;font-size:20px;font-weight:800;margin-bottom:6px}
.success-sub{font-size:13px;color:var(--muted);line-height:1.6;margin-bottom:20px}
.success-close{padding:12px 28px;background:var(--green);border:none;border-radius:10px;color:#fff;font-size:14px;font-weight:700;cursor:pointer}

/* Info footer */
.info-footer{text-align:center;font-size:11px;color:var(--muted);padding-top:8px;line-height:1.8}
.info-footer a{color:var(--blue);text-decoration:none}

/* Loading */
.loading{text-align:center;padding:40px;color:var(--muted);font-size:13px}
.spinner{display:inline-block;width:28px;height:28px;border:3px solid #1E2D45;border-top-color:var(--blue);border-radius:50%;animation:spin .8s linear infinite;margin-bottom:12px}
@keyframes spin{to{transform:rotate(360deg)}}

/* Trip selector */
.trip-selector{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:16px;margin-bottom:16px}
.trip-option{padding:12px 14px;background:#1E293B;border-radius:9px;margin-bottom:8px;cursor:pointer;border:2px solid transparent;transition:all .2s}
.trip-option:last-child{margin-bottom:0}
.trip-option.selected{border-color:var(--blue);background:#1D4ED815}
.trip-option-title{font-size:13px;font-weight:600}
.trip-option-sub{font-size:11px;color:var(--muted);margin-top:2px}
</style>
</head>
<body>

<div class="page">
  <div class="hdr">
    <div class="logo">QUIK <span>⬡</span></div>
    <div id="store-header">
      <div style="height:20px"></div>
      <div class="spinner"></div>
    </div>
  </div>

  <div id="main-content">
    <div class="loading"><div class="spinner"></div><br>Loading…</div>
  </div>
</div>

<!-- Success overlay -->
<div class="success-overlay" id="success-ov">
  <div class="success-box">
    <span class="success-emoji" id="success-emoji">✅</span>
    <div class="success-title" id="success-title">Done!</div>
    <div class="success-sub" id="success-sub">Update saved to dashboard.</div>
    <button class="success-close" onclick="closeSuccess()">OK</button>

<script>
// ── Firebase ──────────────────────────────────────────────────
const firebaseConfig = {
  apiKey: "AIzaSyDcyoPRjE0Fcr4bJOD9h8B_Me3zb5IdQKg",
  authDomain: "quik-transport.firebaseapp.com",
  databaseURL: "https://quik-transport-default-rtdb.firebaseio.com",
  projectId: "quik-transport",
  storageBucket: "quik-transport.firebasestorage.app",
  messagingSenderId: "860154002421",
  appId: "1:860154002421:web:315c836dbded51a73d3ebc"

firebase.initializeApp(firebaseConfig);
const db      = firebase.database();
const storage = firebase.storage();

// ── Store coordinates for GPS verification ────────────────────
const STORE_COORDS = {
  QUIK_RAFFA:      { lat:25.250849, lng:55.282002, radius:500 },
  QUIK_UMS:        { lat:25.155234, lng:55.204014, radius:500 },
  QUIK_DWTC:       { lat:25.220714, lng:55.289374, radius:500 },

  QUIK_DEIRA:      { lat:25.275296, lng:55.328593, radius:500 },
  QUIK_ALQUSAIS:   { lat:25.291957, lng:55.403031, radius:500 },
  QUIK_BB2:        { lat:25.184692, lng:55.274729, radius:500 },
  QUIK_BB:         { lat:25.184949, lng:55.275402, radius:500 },

  QUIK_ARJAN:      { lat:25.05885, lng:55.23368, radius:500 },

  QUIK_REEM:       { lat:24.484858, lng:54.408614, radius:500 },
  QUIK_BANIYAS:    { lat:24.300298, lng:54.61623, radius:500 },

  QUIK_WAHA:       { lat:24.263571, lng:55.765212, radius:500 },
  QUIK_SHAMKHA:    { lat:24.403576, lng:54.697914, radius:500 },
};

// ── Haversine distance (meters) ───────────────────────────────
function distMeters(lat1,lng1,lat2,lng2){
  const R=6371000,dLat=(lat2-lat1)*Math.PI/180,dLng=(lng2-lng1)*Math.PI/180;
  const a=Math.sin(dLat/2)**2+Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*Math.sin(dLng/2)**2;
  return R*2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a));
}

// ── GPS Check — returns promise ───────────────────────────────
function checkGPS(store) {
  return new Promise((resolve, reject) => {
    const coords = STORE_COORDS[store];
    if (!coords) { resolve({ ok:true, dist:0, note:'no-coords' }); return; }

    if (!navigator.geolocation) {
      reject(new Error('GPS is not supported on this device'));
      return;
    }

    // Show waiting UI
    showGPSWaiting();

    navigator.geolocation.getCurrentPosition(
      pos => {
        hideGPSWaiting();
        const dist = distMeters(pos.coords.latitude, pos.coords.longitude, coords.lat, coords.lng);
        const allowed = dist <= coords.radius;
        resolve({ ok: allowed, dist: Math.round(dist), radius: coords.radius });
      },
      err => {
        hideGPSWaiting();
        let msg = 'GPS error';
        if (err.code === 1) msg = 'GPS permission denied — please allow location access';
        else if (err.code === 2) msg = 'GPS signal nahi mila — bahar jao ya WiFi on karo';
        else if (err.code === 3) msg = 'GPS timeout — dobara try karo';
        reject(new Error(msg));
      },
      { enableHighAccuracy: true, timeout: 15000, maximumAge: 0 }
    );
  });
}

function showGPSWaiting() {
  let el = document.getElementById('gps-wait');
  if (!el) {
    el = document.createElement('div');
    el.id = 'gps-wait';
    el.style.cssText = 'position:fixed;inset:0;background:rgba(0,0,0,.8);z-index:200;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px';
    el.innerHTML = '<div style="font-size:40px">📍</div><div style="color:#fff;font-size:15px;font-weight:600">GPS location check ho rahi hai…</div><div style="color:#64748B;font-size:12px">Allow location access if prompted</div>';
    document.body.appendChild(el);
  }
  el.style.display = 'flex';
}
function hideGPSWaiting() {
  const el = document.getElementById('gps-wait');
  if (el) el.style.display = 'none';
}

// ── GPS-guarded action wrapper ────────────────────────────────
async function withGPS(actionFn) {
  try {
    const result = await checkGPS(STORE);
    if (!result.ok) {
      showSuccess('🚫', 'Aap store pe nahi hain!',
        `Aap ${result.dist}m door hain.\nAllowed radius: ${result.radius}m\n\nPehle store pe pahunchein, phir scan karein.`);
      // Override success close to not do anything
      document.getElementById('success-ov').querySelector('button').onclick = closeSuccess;
      return;
    }
    await actionFn();
  } catch(err) {
    showSuccess('⚠️', 'GPS Error', err.message + '\n\nLocation access allow karo settings mein.');
    document.getElementById('success-ov').querySelector('button').onclick = closeSuccess;
  }
}
const params  = new URLSearchParams(window.location.search);
const STORE   = params.get('store') || '';
const DATE    = params.get('date')  || new Date().toISOString().split('T')[0];

// State
let matchedTrips = [];
let selectedTripId = null;
let driverName = localStorage.getItem('quik_driver_name') || '';
let storeState = { arr: null, dep: null, completed: false, photoURL: null };

// ── Format time now ───────────────────────────────────────────
function nowTime() {
  return new Date().toLocaleTimeString('en-GB', { hour:'2-digit', minute:'2-digit' });
}
function nowDate() {
  return new Date().toISOString().split('T')[0];
}

// ── Find trips for this store + today ─────────────────────────
function init() {
  if (!STORE) {
    document.getElementById('main-content').innerHTML =
      `<div class="loading" style="color:var(--red)">❌ Invalid QR code — store not found</div>`;
    return;
  }

  document.getElementById('store-header').innerHTML = `
    <div class="store-badge">📍 Store Check-in</div>
    <div class="store-name">${STORE.replace('QUIK_','')}</div>
    <div style="font-size:12px;color:var(--muted);margin-top:6px">${DATE}</div>
  `;

  // Listen to trips in real-time
  db.ref('trips').on('value', snap => {
    const data = snap.val() || {};
    matchedTrips = Object.entries(data)
      .map(([id, t]) => ({ ...t, _id: id }))
      .filter(t =>
        t.date === DATE &&
        Array.isArray(t.storeNames) &&
        t.storeNames.includes(STORE)
      );

    if (matchedTrips.length === 0) {
      // No trip today — show message but still allow manual check-in
      renderNoTrip();
    } else if (matchedTrips.length === 1) {
      selectedTripId = matchedTrips[0]._id;
      loadStoreState(matchedTrips[0]);
      renderCheckIn();
    } else {
      // Multiple trips — show selector
      renderTripSelector();
    }
  });
}

function loadStoreState(trip) {
  if (!trip) return;
  const st = (trip.storeTimes && trip.storeTimes[STORE]) || {};
  // ✅ FIX: completion is store-specific (st.completed), NOT trip.status
  // trip.status='Completed' should not bleed to other stores
  storeState = {
    arr:       st.arr           || null,
    dep:       st.dep           || null,
    completed: !!st.completed,          // store-level flag only
    photoURL:  st.photoURL      || null,
  };
}

// ── RENDER: No trip found ─────────────────────────────────────
function renderNoTrip() {
  document.getElementById('main-content').innerHTML = `
    <div class="status-card" style="text-align:center;padding:24px">
      <div style="font-size:40px;margin-bottom:12px">📋</div>
      <div style="font-size:14px;font-weight:600;margin-bottom:6px">No trip scheduled</div>
      <div style="font-size:12px;color:var(--muted);line-height:1.7">
        No trip found for <strong>${STORE}</strong> today (${DATE}).<br>
        Ask your supervisor to add this trip in the dashboard.
      </div>
    </div>
    <div class="info-footer">
      <a href="javascript:void(0)" onclick="forceDate()">Wrong date? Tap here</a>
    </div>`;
}

// ── RENDER: Trip selector (multiple trips) ────────────────────
function renderTripSelector() {
  const options = matchedTrips.map(t => `
    <div class="trip-option ${selectedTripId===t._id?'selected':''}" onclick="selectTrip('${t._id}')">
      <div class="trip-option-title">🚛 ${t.driver} — ${t.trip2?'Trip 2':'Trip 1'}</div>
      <div class="trip-option-sub">${t.vt} · ${t.vid||'—'} · ${(t.storeNames||[]).length} stores</div>
    </div>`).join('');

  document.getElementById('main-content').innerHTML = `
    <div class="trip-selector">
      <label class="driver-label">Select your trip</label>
      ${options}
    </div>
    <button class="action-btn btn-arrived" onclick="confirmTripSelect()" style="margin-top:4px">
      <span class="btn-icon">✅</span> Continue
    </button>`;
}

function selectTrip(id) {
  selectedTripId = id;
  document.querySelectorAll('.trip-option').forEach(el => el.classList.remove('selected'));
  document.querySelector(`[onclick="selectTrip('${id}')"]`)?.classList.add('selected');
}

function confirmTripSelect() {
  if (!selectedTripId) return;
  const trip = matchedTrips.find(t => t._id === selectedTripId);
  loadStoreState(trip);
  renderCheckIn();
}

// ── RENDER: Main check-in screen ──────────────────────────────
function renderCheckIn() {
  const s = storeState;
  const arrDone = !!s.arr, depDone = !!s.dep;

  document.getElementById('main-content').innerHTML = `
    <!-- Driver name -->
    <div class="driver-section">
      <label class="driver-label">Your Name</label>
      <input class="driver-input" id="driver-inp" type="text"
        placeholder="Enter your name…" value="${driverName}"
        oninput="driverName=this.value;localStorage.setItem('quik_driver_name',this.value)">
    </div>

    <!-- Status timeline -->
    <div class="status-card">
      <div class="sc-title">Today's Status — ${STORE.replace('QUIK_','')}</div>

      <div class="status-row">
        <div class="status-icon ${arrDone?'si-done':''}" style="${!arrDone?'background:#1E293B':''}">
          ${arrDone?'✅':'🔵'}
        </div>
        <div class="status-info">
          <div class="status-label">1. Arrived at Store</div>
          <div class="status-time">${arrDone?'✓ '+s.arr:'Pending'}</div>
        </div>
      </div>

      <div class="status-row">
        <div class="status-icon ${depDone?'si-done':''}" style="${!depDone?'background:#1E293B':''}">
          ${depDone?'✅':'🟠'}
        </div>
        <div class="status-info">
          <div class="status-label">2. Departed Store</div>
          <div class="status-time">${depDone?'✓ '+s.dep:'Pending'}</div>
        </div>
      </div>
    </div>

    <!-- Photo upload section — shown after arrived, before departed -->
    ${arrDone && !depDone ? `
    <div class="photo-section">
      <label class="driver-label">📷 Delivery Proof (Optional)</label>
      <label class="photo-upload-btn" for="photo-inp">
        ${storeState.photoURL ? '✅ Photo uploaded — tap to change' : '📸 Take photo / upload proof'}
      </label>
      <input type="file" id="photo-inp" accept="image/*" capture="environment" style="display:none" onchange="handlePhotoSelect(this)">
      <img id="photo-preview" class="photo-preview" src="${storeState.photoURL||''}" ${storeState.photoURL?'style="display:block"':''}>
      <div class="upload-prog" id="upload-prog"><div class="upload-prog-bar" id="upload-bar"></div></div>
      <div id="photo-status" style="font-size:11px;color:var(--muted);margin-top:6px;text-align:center">${storeState.photoURL?'Photo ready ✅':''}</div>
    </div>` : ''}

    <!-- Action buttons: Arrived → Departed only -->
    <div class="action-section">
      <button class="action-btn btn-arrived" id="btn-arr"
        onclick="markArrived()" ${arrDone?'disabled':''}>
        <span class="btn-icon">📍</span>
        ${arrDone?'Arrived ✓ — '+s.arr:'1. Mark Arrived'}
      </button>

      <button class="action-btn btn-departed" id="btn-dep"
        onclick="markDeparted()" ${(!arrDone||depDone)?'disabled':''}>
        <span class="btn-icon">🚛</span>
        ${depDone?'Departed ✓ — '+s.dep:'2. Mark Departed'}
      </button>
    </div>

    <div class="info-footer">
      Trip updates to <strong>QUIK Dashboard</strong> in real-time<br>
      <span style="font-size:10px">Trip ID: ${selectedTripId}</span>
    </div>

    <!-- Regional Store Status -->
    <div id="regional-status" style="margin-top:16px"></div>`;

  loadRegionalStatus();
}

// ── REGIONAL STORE STATUS ─────────────────────────────────────
const STORE_REGIONS_CK = {
  'AUH + Al Ain': ['QUIK_REEM','QUIK_ETISALAT','QUIK_MURJAN','QUIK_RAHA','QUIK_SHAMKHA','QUIK_MBZ','QUIK_BANIYAS','QUIK_WAHA'],
  'North Dubai':  ['QUIK_ALQUSAIS','QUIK_DEIRA','QUIK_RAFFA','QUIK_JADDAF','QUIK_DFC','QUIK_DWTC'],
  'Center Dubai': ['QUIK_WASL','QUIK_BB','QUIK_BB2','QUIK_BB3','QUIK_MEYDAN','QUIK_UMS','QUIK_DSO','QUIK_ALQUOZ','QUIK_BARSHA','QUIK_INTERNETC'],
  'South Dubai':  ['QUIK_DUBAILAND','QUIK_MARINA','QUIK_MARINA2','QUIK_JLT','QUIK_CITYLAND','QUIK_ARJAN','QUIK_JVC_PLAZA','QUIK_JVC','QUIK_MOTORC','QUIK_JVT','QUIK_SPORTSCITY','QUIK_FURJAN','QUIK_DIP1'],
};
function fmt12ck(t) {
  if (!t) return '—';
  const [h,mn] = t.split(':').map(Number);
  return `${h%12||12}:${String(mn).padStart(2,'0')} ${h>=12?'PM':'AM'}`;
}
function timeDiffCk(t1,t2) {
  if (!t1||!t2) return null;
  const [h1,m1]=t1.split(':').map(Number),[h2,m2]=t2.split(':').map(Number);
  const diff=(h2*60+m2)-(h1*60+m1); return diff<0?diff+1440:diff;
}
async function loadRegionalStatus() {
  const el = document.getElementById('regional-status');
  if (!el) return;
  const today = nowDate();
  try {
    const snap = await db.ref('checkins').orderByChild('date').equalTo(today).once('value');
    const all = snap.val() ? Object.values(snap.val()) : [];
    const smap = {};
    all.forEach(c => {
      if (!c.store) return;
      if (!smap[c.store]) smap[c.store] = { arr:null, dep:null, comp:null };
      const s = smap[c.store];
      if (c.action==='arrived'   && (!s.arr ||c.time>s.arr))  s.arr  = c.time;
      if (c.action==='departed'  && (!s.dep ||c.time>s.dep))  s.dep  = c.time;
      if (c.action==='completed' && (!s.comp||c.time>s.comp)) s.comp = c.time;
    });
    const regionColors = {'AUH + Al Ain':'#8B5CF6','North Dubai':'#3B82F6','Center Dubai':'#22C55E','South Dubai':'#F97316'};
    el.innerHTML = `<div style="margin-top:8px">
      <div style="font-size:11px;font-weight:700;color:#94A3B8;letter-spacing:.5px;text-transform:uppercase;margin-bottom:10px">📍 Today's Store Status</div>
      ${Object.entries(STORE_REGIONS_CK).map(([region, stores]) => {
        const color = regionColors[region]||'#64748B';
        const doneCount = stores.filter(s => smap[s]?.dep||smap[s]?.comp).length;
        const arrCount  = stores.filter(s => smap[s]?.arr).length;
        return `<div style="background:#1E293B;border:1px solid #334155;border-radius:10px;margin-bottom:10px;overflow:hidden">
          <div style="background:#243040;padding:8px 12px;display:flex;align-items:center;justify-content:space-between">
            <span style="font-size:11px;font-weight:700;color:${color}">${region}</span>
            <span style="font-size:10px;color:#64748B">${arrCount} arrived · ${doneCount}/${stores.length} done</span>
          </div>
          <div style="overflow-x:auto"><table style="width:100%;border-collapse:collapse;font-size:11px">
            <thead><tr style="background:#1A2535">
              <th style="padding:6px 10px;text-align:left;color:#64748B;font-size:9px;text-transform:uppercase">Store</th>
              <th style="padding:6px 8px;text-align:center;color:#64748B;font-size:9px;text-transform:uppercase">Check-in</th>
              <th style="padding:6px 8px;text-align:center;color:#64748B;font-size:9px;text-transform:uppercase">Check-out</th>
              <th style="padding:6px 8px;text-align:center;color:#64748B;font-size:9px;text-transform:uppercase">Duration</th>
            </tr></thead>
            <tbody>
            ${stores.map(store => {
              const s = smap[store]||{};
              const mins = timeDiffCk(s.arr, s.dep||s.comp);
              const isCurrent = store === STORE;
              const sc = s.dep?'#F97316':s.comp?'#22C55E':s.arr?'#3B82F6':'#334155';
              return `<tr style="border-top:1px solid #1E2937;${isCurrent?'background:#1CE78312':''}">
                <td style="padding:7px 10px">
                  <div style="display:flex;align-items:center;gap:6px">
                    <div style="width:5px;height:5px;border-radius:50%;background:${sc};flex-shrink:0"></div>
                    <span style="font-weight:${isCurrent?700:500};color:${isCurrent?'#1CE783':'#CBD5E1'}">${store.replace('QUIK_','')}${isCurrent?' ◀':''}</span>
                  </div>
                </td>
                <td style="padding:7px 8px;text-align:center;font-family:monospace;color:${s.arr?'#F1F5F9':'#475569'}">${fmt12ck(s.arr)}</td>
                <td style="padding:7px 8px;text-align:center;font-family:monospace;color:${s.dep?'#F97316':s.comp?'#22C55E':'#475569'}">${fmt12ck(s.dep||s.comp)}</td>
                <td style="padding:7px 8px;text-align:center;font-family:monospace;font-weight:600;color:${mins!==null?(mins<=30?'#22C55E':mins<=60?'#F97316':'#EF4444'):'#475569'}">${mins!==null?mins+'m':'—'}</td>
              </tr>`;
            }).join('')}
            </tbody>
          </table></div>
        </div>`;
      }).join('')}
    </div>`;
  } catch(e) { el.innerHTML=''; }
}

// ── ACTIONS ───────────────────────────────────────────────────
function getDriverName() {
  const inp = document.getElementById('driver-inp');
  if (inp) driverName = inp.value.trim();
  return driverName || 'Driver';
}

// ── GPS VERIFICATION ─────────────────────────────────────────
function haversineM(lat1, lng1, lat2, lng2) {
  const R = 6371000; // meters
  const dLat = (lat2-lat1)*Math.PI/180;
  const dLng = (lng2-lng1)*Math.PI/180;
  const a = Math.sin(dLat/2)**2 +
    Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*Math.sin(dLng/2)**2;
  return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
}

function getGPS() {
  return new Promise((resolve, reject) => {
    if (!navigator.geolocation) { reject(new Error('GPS not supported')); return; }
    navigator.geolocation.getCurrentPosition(
      pos => resolve({ lat: pos.coords.latitude, lng: pos.coords.longitude, acc: pos.coords.accuracy }),
      err => reject(err),
      { enableHighAccuracy: true, timeout: 15000, maximumAge: 0 }
    );
  });
}

function showGPSOverlay(msg, color='#EF4444') {
  let ov = document.getElementById('gps-ov');
  if (!ov) {
    ov = document.createElement('div');
    ov.id = 'gps-ov';
    ov.style.cssText = 'position:fixed;inset:0;background:rgba(0,0,0,.85);z-index:200;display:flex;align-items:center;justify-content:center;padding:20px';
    document.body.appendChild(ov);
  }
  ov.innerHTML = `<div style="background:#111827;border:2px solid ${color};border-radius:16px;padding:28px 22px;text-align:center;max-width:320px;width:100%">
    <div style="font-size:42px;margin-bottom:12px">${color==='#22C55E'?'📍':'🚫'}</div>
    <div style="font-size:14px;font-weight:700;color:#F1F5F9;margin-bottom:8px;line-height:1.5">${msg}</div>
    <button onclick="document.getElementById('gps-ov').remove()" style="margin-top:12px;padding:10px 24px;background:${color};border:none;border-radius:8px;color:#fff;font-size:13px;font-weight:700;cursor:pointer">OK</button>
  </div>`;
  ov.style.display = 'flex';
}

async function verifyLocation(actionLabel) {
  // Show loading
  showGPSOverlay(`📡 GPS location check ho rahi hai…<br><span style="font-size:11px;color:#94A3B8">Please wait — ${actionLabel}</span>`, '#3B82F6');

  const coords = STORE_COORDS[STORE];
  if (!coords) {
    document.getElementById('gps-ov')?.remove();
    return true; // No coords — allow
  }

  try {
    const pos = await getGPS();
    const distM = haversineM(pos.lat, pos.lng, coords.lat, coords.lng);
    const radius = coords.radius || 10;
    document.getElementById('gps-ov')?.remove();

    if (distM <= radius) {
      return true; // ✅ Within range
    } else {
      showGPSOverlay(
        `❌ Store se door hain<br><span style="font-size:12px;color:#94A3B8">Aap ${Math.round(distM)}m door hain<br>Store radius: ${radius}m<br><br>Store pe pahunch kar scan karo</span>`,
        '#EF4444'
      );
      return false;
    }
  } catch(err) {
    document.getElementById('gps-ov')?.remove();
    if (err.code === 1) { // Permission denied
      showGPSOverlay('❌ Location permission deny ki hui hai<br><span style="font-size:12px;color:#94A3B8">Phone settings mein location ON karo<br>phir page refresh karo</span>', '#EF4444');
      return false;
    }
    // GPS timeout or other error — block with message
    showGPSOverlay('❌ GPS signal nahi mila<br><span style="font-size:12px;color:#94A3B8">Open area mein jao aur dobara try karo</span>', '#F97316');
    return false;
  }
}

// ── SEQUENTIAL CHECK-IN CHECK ────────────────────────────────
// Driver cannot arrive at new store if they have a pending check-in elsewhere
async function checkSequential() {
  const driver = getDriverName();
  if (!driver || driver === 'Driver') return { ok: true };

  const today = nowDate();
  try {
    const snap = await db.ref('checkins')
      .orderByChild('date').equalTo(today).once('value');
    const all = snap.val() ? Object.values(snap.val()) : [];

    // Filter this driver's checkins today, sorted by time
    const mine = all
      .filter(c => c.driver === driver)
      .sort((a, b) => (b.ts||0) - (a.ts||0));

    if (!mine.length) return { ok: true };

    // Find latest checkin at a DIFFERENT store
    const lastOther = mine.find(c => c.store && c.store !== STORE);
    if (!lastOther) return { ok: true };

    // If last action at another store is NOT 'departed', block
    if (lastOther.action !== 'departed') {
      return {
        ok: false,
        blockedAt: lastOther.store.replace('QUIK_', ''),
        action: lastOther.action,
      };
    }
    return { ok: true };
  } catch(e) {
    console.warn('Sequential check failed:', e);
    return { ok: true }; // fail open
  }
}

async function markArrived() {
  // Sequential check first
  const seq = await checkSequential();
  if (!seq.ok) {
    showSuccess('🚫', 'Pehle wahan se depart karo!',
      `Aap ne ${seq.blockedAt} pe "${seq.action}" kiya hua hai.\n\nPehle wahan se DEPARTED mark karo, phir yahan Arrived kar sako ge.`);
    document.getElementById('success-ov').querySelector('button').onclick = closeSuccess;
    return;
  }

  const ok = await verifyLocation('Arrived');
  if (!ok) return;
  const time = nowTime();
  const driver = getDriverName();
  storeState.arr = time;
  await db.ref(`trips/${selectedTripId}/storeTimes/${STORE}/arr`).set(time);
  await db.ref(`trips/${selectedTripId}/storeTimes/${STORE}/driver`).set(driver);
  await db.ref('checkins').push({
    tripId: selectedTripId, store: STORE, driver, action: 'arrived',
    time, date: nowDate(), ts: Date.now()
  });
  showSuccess('📍', 'Arrived!', `${STORE.replace('QUIK_','')} — ${time}\nDashboard updated ✅`);
  renderCheckIn();
}

async function markDeparted() {
  const ok = await verifyLocation('Departed');
  if (!ok) return;
  const time = nowTime();
  const driver = getDriverName();
  storeState.dep = time;
  storeState.completed = true;

  // Upload photo if selected
  let photoURL = null;
  if (pendingPhotoFile) {
    try {
      const status = document.getElementById('photo-status');
      if (status) status.textContent = 'Uploading photo…';
      photoURL = await uploadPhoto(pendingPhotoFile);
    } catch(e) { console.warn('Photo upload failed:', e); }
  }

  const updates = {};
  updates[`trips/${selectedTripId}/storeTimes/${STORE}/dep`]       = time;
  updates[`trips/${selectedTripId}/storeTimes/${STORE}/completed`]  = time;
  if (photoURL) updates[`trips/${selectedTripId}/storeTimes/${STORE}/photoURL`] = photoURL;

  // Check if ALL stores now done → mark trip Completed
  const tripSnap = await db.ref(`trips/${selectedTripId}`).once('value');
  const trip = tripSnap.val();
  if (trip) {
    const allStores = trip.storeNames || [];
    const storeTimes = trip.storeTimes || {};
    const completedCount = allStores.filter(s =>
      s === STORE ? true : !!(storeTimes[s]?.completed || storeTimes[s]?.dep)
    ).length;
    if (completedCount === allStores.length && allStores.length > 0) {
      updates[`trips/${selectedTripId}/status`] = 'Completed';
      updates[`trips/${selectedTripId}/completedAt`] = time;
    }
  }

  await db.ref().update(updates);
  await db.ref('checkins').push({
    tripId: selectedTripId, store: STORE, driver, action: 'departed',
    time, date: nowDate(), ts: Date.now(), photoURL: photoURL||null,
  });

  pendingPhotoFile = null;
  showSuccess('🚛', 'Departed!', `Left ${STORE.replace('QUIK_','')} at ${time}\nDashboard updated ✅`);
  renderCheckIn();
}

// ── PHOTO UPLOAD ──────────────────────────────────────────────
let pendingPhotoFile = null;

function handlePhotoSelect(input) {
  const file = input.files[0];
  if (!file) return;
  pendingPhotoFile = file;
  // Show preview
  const reader = new FileReader();
  reader.onload = e => {
    const prev = document.getElementById('photo-preview');
    if (prev) { prev.src = e.target.result; prev.style.display = 'block'; }
    const status = document.getElementById('photo-status');
    if (status) status.textContent = 'Photo ready — mark complete karo ✅';
  };
  reader.readAsDataURL(file);
}

async function uploadPhoto(file) {
  const path = `delivery_proofs/${DATE}/${STORE}/${selectedTripId}_${Date.now()}.jpg`;
  const ref = storage.ref(path);
  const prog = document.getElementById('upload-prog');
  const bar  = document.getElementById('upload-bar');
  const status = document.getElementById('photo-status');
  if (prog) prog.style.display = 'block';
  if (status) status.textContent = 'Uploading…';

  return new Promise((resolve, reject) => {
    const task = ref.put(file);
    task.on('state_changed',
      snap => {
        const pct = (snap.bytesTransferred / snap.totalBytes * 100).toFixed(0);
        if (bar) bar.style.width = pct + '%';
      },
      reject,
      async () => {
        const url = await ref.getDownloadURL();
        resolve(url);
      }
    );
  });
}

async function markCompleted() {
  const ok = await verifyLocation('Delivery Completed');
  if (!ok) return;
  const time   = nowTime();
  const driver = getDriverName();

  // Upload photo if selected
  let photoURL = null;
  if (pendingPhotoFile) {
    try {
      const status = document.getElementById('photo-status');
      if (status) status.textContent = 'Uploading photo…';
      photoURL = await uploadPhoto(pendingPhotoFile);
    } catch(e) {
      console.warn('Photo upload failed:', e);
    }
  }

  storeState.completed = true;
  storeState.photoURL  = photoURL;

  // ✅ FIX: Save completion at STORE level, not trip level
  const updates = {};
  updates[`trips/${selectedTripId}/storeTimes/${STORE}/completed`] = time;
  updates[`trips/${selectedTripId}/storeTimes/${STORE}/completedAt`] = time;
  if (photoURL) updates[`trips/${selectedTripId}/storeTimes/${STORE}/photoURL`] = photoURL;

  // Check if ALL stores in this trip are now completed — then mark trip Completed
  const tripSnap = await db.ref(`trips/${selectedTripId}`).once('value');
  const trip = tripSnap.val();
  if (trip) {
    const allStores = trip.storeNames || [];
    const storeTimes = trip.storeTimes || {};
    // Count completed stores (including this one we just completed)
    const completedCount = allStores.filter(s =>
      s === STORE ? true : !!storeTimes[s]?.completed
    ).length;
    if (completedCount === allStores.length && allStores.length > 0) {
      updates[`trips/${selectedTripId}/status`] = 'Completed';
      updates[`trips/${selectedTripId}/completedAt`] = time;
    }
  }

  await db.ref().update(updates);

  await db.ref('checkins').push({
    tripId: selectedTripId, store: STORE, driver, action: 'completed',
    time, date: nowDate(), ts: Date.now(), photoURL: photoURL||null,
  });

  pendingPhotoFile = null;
  const allDone = trip && (trip.storeNames||[]).every(s =>
    s === STORE ? true : !!(trip.storeTimes||{})[s]?.completed
  );
  showSuccess('🎉', 'Delivery Complete!',
    `${STORE.replace('QUIK_','')} marked complete\n${allDone ? '✅ All stores done — Trip Completed!' : 'Dashboard updated ✅'}`);
  renderCheckIn();
}

// ── SUCCESS POPUP ─────────────────────────────────────────────
function showSuccess(emoji, title, sub) {
  document.getElementById('success-emoji').textContent = emoji;
  document.getElementById('success-title').textContent = title;
  document.getElementById('success-sub').textContent = sub;
  document.getElementById('success-ov').classList.add('show');
  // Auto close after 3s
  setTimeout(closeSuccess, 3000);
}
function closeSuccess() {
  document.getElementById('success-ov').classList.remove('show');
}

function forceDate() {
  const d = prompt('Enter date (YYYY-MM-DD):', new Date().toISOString().split('T')[0]);
  if (d) window.location.href = `?store=${STORE}&date=${d}`;
}

// ── START ─────────────────────────────────────────────────────
init();
</script>
